<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AFMS Users</title><style>body{font-family:Inter,system-ui;margin:0;background:#eef2f7;color:#172033}.wrap{max-width:1100px;margin:auto;padding:28px}.card{background:#fff;border:1px solid #e4e7ec;border-radius:16px;padding:22px;box-shadow:0 6px 20px rgba(16,24,40,.05);margin-top:18px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid input,.grid select,.grid button,.login input,.login button{padding:11px;border:1px solid #d0d5dd;border-radius:10px}.grid button,.login button{background:#1570ef;color:#fff;border:0;font-weight:700;cursor:pointer}table{width:100%;border-collapse:collapse}th,td{padding:13px;border-top:1px solid #eaecf0;text-align:left}th{color:#667085;font-size:11px;text-transform:uppercase}.badge{padding:5px 8px;border-radius:999px;background:#eff4ff;color:#1849a9;font-size:11px;font-weight:700}.login{max-width:420px;margin:10vh auto;display:grid;gap:12px}.error{color:#b42318;background:#fef3f2;padding:10px;border-radius:8px}.top{display:flex;justify-content:space-between}.top a{color:#1570ef;text-decoration:none}@media(max-width:760px){.grid{grid-template-columns:1fr 1fr}.card{overflow:auto}}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><header class="top"><div><p>AFMS v4.0 · Commit 0029</p><h1>User Management</h1></div><a href="/">Back to dashboard</a></header><section id="login" class="card login"><h2>Administrator login</h2><input id="username" placeholder="Username" value="admin"><input id="password" type="password" placeholder="Password"><button id="loginButton">Sign in</button><div id="loginError"></div></section><section id="app" hidden><div class="card"><h2>Create user</h2><div class="grid"><input id="newUsername" placeholder="Username"><input id="displayName" placeholder="Display name"><select id="role"><option>VIEWER</option><option>OPERATOR</option><option>MAINTENANCE</option><option>SUPERVISOR</option><option>ADMIN</option></select><input id="newPassword" type="password" placeholder="Temporary password"><button id="create">Create user</button></div><div id="error"></div></div><div class="card"><h2>Users</h2><table><thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Status</th><th>Action</th></tr></thead><tbody id="users"></tbody></table></div></section></main><script>let token=sessionStorage.getItem('afmsToken')||'';const q=s=>document.querySelector(s);async function api(path,options={}){const r=await fetch(path,{...options,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,...(options.headers||{})}});if(!r.ok){const x=await r.json().catch(()=>({}));throw new Error(x.error||('API '+r.status))}return r.status===204?null:r.json()}async function loadUsers(){const users=await api('/api/v1/auth/users');q('#users').innerHTML=users.map(u=>`<tr><td><b>${u.username}</b></td><td>${u.displayName}</td><td><span class="badge">${u.role}</span></td><td>${u.active?'Active':'Disabled'}</td><td><button onclick="toggleUser('${u.id}',${!u.active})">${u.active?'Disable':'Enable'}</button></td></tr>`).join('')}async function start(){try{await api('/api/v1/auth/me');q('#login').hidden=true;q('#app').hidden=false;await loadUsers()}catch{q('#login').hidden=false;q('#app').hidden=true}}q('#loginButton').onclick=async()=>{try{const r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:q('#username').value,password:q('#password').value})});const x=await r.json();if(!r.ok)throw new Error(x.error||'Login failed');token=x.token;sessionStorage.setItem('afmsToken',token);q('#loginError').innerHTML='';start()}catch(e){q('#loginError').innerHTML=`<div class="error">${e.message}</div>`}};q('#create').onclick=async()=>{try{await api('/api/v1/auth/users',{method:'POST',body:JSON.stringify({username:q('#newUsername').value,displayName:q('#displayName').value,role:q('#role').value,password:q('#newPassword').value})});q('#error').innerHTML='';await loadUsers()}catch(e){q('#error').innerHTML=`<div class="error">${e.message}</div>`}};window.toggleUser=async(id,active)=>{await api('/api/v1/auth/users/'+id,{method:'PATCH',body:JSON.stringify({active})});loadUsers()};start();</script></body></html>
