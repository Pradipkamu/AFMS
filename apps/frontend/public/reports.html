<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AFMS Reports</title><style>body{font-family:Inter,system-ui;margin:0;background:#eef2f7;color:#172033}.wrap{max-width:1400px;margin:auto;padding:28px}.top{display:flex;justify-content:space-between;align-items:center;gap:20px}.top a{color:#1570ef;text-decoration:none}.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0}.controls label{display:grid;gap:6px;font-size:12px;color:#667085}.controls input,.controls button{padding:11px;border:1px solid #d0d5dd;border-radius:10px;background:#fff}.controls button{background:#1570ef;color:#fff;border:0;font-weight:700;cursor:pointer}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card,.panel{background:#fff;border:1px solid #e4e7ec;border-radius:15px;box-shadow:0 6px 20px rgba(16,24,40,.05)}.card{padding:18px}.card span{color:#667085;font-size:12px}.card strong{display:block;font-size:28px;margin-top:8px}.panel{margin-top:20px;overflow:auto}.panel h2{padding:18px;margin:0}.panel table{width:100%;border-collapse:collapse}.panel th,.panel td{padding:13px 16px;border-top:1px solid #eaecf0;text-align:left;white-space:nowrap}.panel th{background:#f9fafb;color:#667085;font-size:11px;text-transform:uppercase}.error{padding:12px;background:#fef3f2;color:#b42318;border-radius:10px}@media(max-width:800px){.controls,.cards{grid-template-columns:1fr 1fr}.top{align-items:flex-start}}@media(max-width:520px){.controls,.cards{grid-template-columns:1fr}}</style></head><body><main class="wrap"><header class="top"><div><p>AFMS v4.0 · Commit 0028</p><h1>Production Reports</h1><a href="/">← Back to dashboard</a></div><a id="csv" href="#">Download telemetry CSV</a></header><section class="controls"><label>From<input id="from" type="datetime-local"></label><label>To<input id="to" type="datetime-local"></label><label>Machine<input id="machine" placeholder="All machines"></label><button id="run">Generate report</button></section><div id="error"></div><section class="cards"><article class="card"><span>Total parts</span><strong id="total">0</strong></article><article class="card"><span>Good parts</span><strong id="good">0</strong></article><article class="card"><span>Reject parts</span><strong id="reject">0</strong></article><article class="card"><span>Downtime minutes</span><strong id="minutes">0</strong></article></section><section class="panel"><h2>Production by machine</h2><table><thead><tr><th>Machine</th><th>Total</th><th>Good</th><th>Reject</th><th>Quality</th></tr></thead><tbody id="production"></tbody></table></section><section class="panel"><h2>Top downtime losses</h2><table><thead><tr><th>Machine</th><th>Loss</th><th>Category</th><th>Events</th><th>Minutes</th></tr></thead><tbody id="downtime"></tbody></table></section></main><script>const q=s=>document.querySelector(s);const local=d=>{const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`};q('#to').value=local(new Date());q('#from').value=local(new Date(Date.now()-24*3600000));async function load(){const p=new URLSearchParams({from:new Date(q('#from').value).toISOString(),to:new Date(q('#to').value).toISOString(),machineId:q('#machine').value});q('#csv').href='/api/v1/reports/telemetry.csv?'+p;try{const r=await fetch('/api/v1/reports/summary?'+p);if(!r.ok)throw new Error('Report API '+r.status);const x=await r.json();const total=x.production.reduce((s,v)=>s+v.totalParts,0),reject=x.production.reduce((s,v)=>s+v.rejectParts,0),seconds=x.downtime.reduce((s,v)=>s+Number(v.durationSeconds||0),0);q('#total').textContent=total;q('#good').textContent=total-reject;q('#reject').textContent=reject;q('#minutes').textContent=Math.round(seconds/60);q('#production').innerHTML=x.production.map(v=>`<tr><td><b>${v.machineId}</b></td><td>${v.totalParts}</td><td>${v.goodParts}</td><td>${v.rejectParts}</td><td>${Number(v.quality).toFixed(1)}%</td></tr>`).join('');q('#downtime').innerHTML=x.downtime.map(v=>`<tr><td>${v.machineId}</td><td><b>${v.lossCode}</b></td><td>${v.category}</td><td>${v.events}</td><td>${Math.round(Number(v.durationSeconds||0)/60)}</td></tr>`).join('');q('#error').innerHTML='';}catch(e){q('#error').innerHTML=`<p class="error">${e.message}</p>`}}q('#run').onclick=load;load();</script></body></html>
