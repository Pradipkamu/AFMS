name: ESP8266 Firmware Build

on:
  push:
    branches: [main]
    paths:
      - 'AFMS.ino'
      - 'src/**'
      - '.github/workflows/firmware-build.yml'
  pull_request:
    paths:
      - 'AFMS.ino'
      - 'src/**'
      - '.github/workflows/firmware-build.yml'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - name: Install ESP8266 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266@3.1.2
      - name: Install libraries
        run: |
          arduino-cli lib install "ArduinoJson@6.21.5"
          arduino-cli lib install "ModbusMaster"
          arduino-cli lib install "AsyncTelegram2"
      - name: Compile AFMS and export binaries
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn esp8266:esp8266:generic \
            --warnings all \
            --export-binaries \
            --output-dir build \
            . 2>&1 | tee build/compile.log
      - name: Record firmware size
        run: |
          find build -maxdepth 1 -type f -printf '%f %s bytes\n' | sort | tee build/artifact-sizes.txt
          test -s build/AFMS.ino.bin
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: afms-esp8266-firmware
          path: |
            build/AFMS.ino.bin
            build/AFMS.ino.elf
            build/compile.log
            build/artifact-sizes.txt
          if-no-files-found: error
          retention-days: 30
