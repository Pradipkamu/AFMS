services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afms}
      POSTGRES_USER: ${POSTGRES_USER:-afms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afms} -d ${POSTGRES_DB:-afms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./apps/backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-afms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-afms}
      AFMS_ADMIN_USERNAME: ${AFMS_ADMIN_USERNAME:-admin}
      AFMS_ADMIN_PASSWORD: ${AFMS_ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
